name: FalconAI Code Quality Check

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  quality-check:

    runs-on: ubuntu-latest


    steps:


      - name: Checkout
        uses: actions/checkout@v4



      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"



      # ==========================================
      # Python Syntax Check
      # ==========================================

      - name: Python Compile Check
        run: |

          python -m compileall backend



      # ==========================================
      # Duplicate Detection
      # ==========================================

      - name: Duplicate Code Detection
        run: |

          python - <<'PY'

          import ast


          file = "backend/app/ai/signals_engine.py"


          with open(file, "r", encoding="utf-8") as f:

              tree = ast.parse(f.read())



          classes = []

          functions = []



          for node in ast.walk(tree):

              if isinstance(node, ast.ClassDef):

                  classes.append(node.name)



              if isinstance(node, ast.FunctionDef):

                  functions.append(node.name)



          print("Checking classes...")


          for name in set(classes):

              if classes.count(name) > 1:

                  raise Exception(
                      f"Duplicate class found: {name}"
                  )



          print("Checking important functions...")



          important = [

              "analyze",

              "analyze_market",

              "detect_market_regime",

              "detect_early_trend",

              "calculate_confidence",

              "make_decision",

              "health_check"

          ]



          for name in important:

              if functions.count(name) > 1:

                  raise Exception(
                      f"Duplicate function found: {name}"
                  )



          print("Duplicate check passed")


          PY




      # ==========================================
      # SignalEngine Structure Check
      # ==========================================

      - name: SignalEngine Structure Check
        run: |

          python - <<'PY'


          import ast



          file = "backend/app/ai/signals_engine.py"



          with open(file, "r", encoding="utf-8") as f:

              tree = ast.parse(f.read())



          classes = [

              n.name

              for n in ast.walk(tree)

              if isinstance(n, ast.ClassDef)

          ]



          functions = [

              n.name

              for n in ast.walk(tree)

              if isinstance(n, ast.FunctionDef)

          ]



          if classes.count("SignalEngine") != 1:

              raise Exception(
                  "SignalEngine class problem"
              )



          required = [

              "analyze",

              "calculate_confidence",

              "make_decision",

              "health_check"

          ]



          for fn in required:

              if fn not in functions:

                  raise Exception(
                      f"Missing function: {fn}"
                  )



          print(
              "SignalEngine structure OK"
          )


          PY




      # ==========================================
      # File Size Check
      # ==========================================

      - name: File Size Check
        run: |

          python - <<'PY'


          file = "backend/app/ai/signals_engine.py"



          lines = sum(

              1

              for _ in open(
                  file,
                  encoding="utf-8"
              )

          )



          print(
              "signals_engine.py lines:",
              lines
          )



          if lines > 15000:

              raise Exception(
                  "signals_engine.py too large"
              )



          print(
              "File size OK"
          )


          PY




      # ==========================================
      # Final Production Audit
      # ==========================================

      - name: FalconAI Final Audit
        run: |

          python - <<'PY'


          import ast



          file = "backend/app/ai/signals_engine.py"



          with open(file, "r", encoding="utf-8") as f:

              code = f.read()

              tree = ast.parse(code)



          print(
              "Starting FalconAI Final Audit..."
          )



          # TODO Check

          if "TODO" in code:

              print(
                  "WARNING: TODO found"
              )



          # Pass Check

          pass_count = sum(

              1

              for node in ast.walk(tree)

              if isinstance(node, ast.Pass)

          )



          print(
              "Pass statements:",
              pass_count
          )



          # Import Check

          imports = [

              node.names[0].name

              for node in ast.walk(tree)

              if isinstance(
                  node,
                  ast.Import
              )

          ]



          print(
              "Imports detected:",
              len(imports)
          )



          # Final confirmation

          print(
              "================================"
          )

          print(
              "FalconAI Production Audit PASSED"
          )

          print(
              "SignalEngine READY"
          )

          print(
              "================================"
          )


          PY
