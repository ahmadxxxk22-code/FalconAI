name: FalconAI Code Quality Check


on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main



jobs:


  quality-check:


    runs-on: ubuntu-latest



    steps:


      - name: Checkout

        uses: actions/checkout@v4



      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"



      # ==========================================
      # Python Syntax Check
      # ==========================================

      - name: Python Compile Check

        run: |

          python -m compileall backend





      # ==========================================
      # Duplicate Code Detection
      # ==========================================

      - name: Duplicate Code Detection

        run: |

          python - <<'PY'

          import ast



          files = [

              "backend/app/ai/signals_engine.py",

              "backend/app/ai/opportunity/opportunity_engine.py"

          ]



          for file in files:


              print("\nChecking:", file)



              with open(
                  file,
                  "r",
                  encoding="utf-8"
              ) as f:

                  tree = ast.parse(f.read())



              classes = []

              functions = []



              for node in ast.walk(tree):

                  if isinstance(node, ast.ClassDef):

                      classes.append(node.name)



                  if isinstance(node, ast.FunctionDef):

                      functions.append(node.name)



              for name in set(classes):


                  if classes.count(name) > 1:

                      raise Exception(

                          f"{file}: Duplicate class {name}"

                      )



              for name in set(functions):


                  if functions.count(name) > 1:

                      raise Exception(

                          f"{file}: Duplicate function {name}"

                      )



              print(
                  "Duplicate check OK"
              )



          PY





      # ==========================================
      # SignalEngine Structure Check
      # ==========================================

      - name: SignalEngine Structure Check

        run: |


          python - <<'PY'


          import ast



          file = (

              "backend/app/ai/signals_engine.py"

          )



          with open(
              file,
              "r",
              encoding="utf-8"
          ) as f:


              tree = ast.parse(
                  f.read()
              )



          classes = [

              n.name

              for n in ast.walk(tree)

              if isinstance(
                  n,
                  ast.ClassDef
              )

          ]



          functions = [

              n.name

              for n in ast.walk(tree)

              if isinstance(
                  n,
                  ast.FunctionDef
              )

          ]



          if classes.count(
              "SignalEngine"
          ) != 1:


              raise Exception(
                  "SignalEngine class invalid"
              )



          required = [

              "analyze",

              "calculate_confidence",

              "make_decision",

              "health_check"

          ]



          for fn in required:


              if fn not in functions:


                  raise Exception(

                      f"Missing SignalEngine method: {fn}"

                  )



          print(
              "SignalEngine READY"
          )


          PY





      # ==========================================
      # OpportunityEngine Structure Check
      # ==========================================

      - name: OpportunityEngine Structure Check

        run: |


          python - <<'PY'


          import ast



          file = (

              "backend/app/ai/opportunity/opportunity_engine.py"

          )



          with open(
              file,
              "r",
              encoding="utf-8"
          ) as f:


              tree = ast.parse(
                  f.read()
              )



          classes = [

              n.name

              for n in ast.walk(tree)

              if isinstance(
                  n,
                  ast.ClassDef
              )

          ]



          functions = [

              n.name

              for n in ast.walk(tree)

              if isinstance(
                  n,
                  ast.FunctionDef
              )

          ]



          if classes.count(
              "OpportunityEngine"
          ) != 1:


              raise Exception(

                  "OpportunityEngine class invalid"

              )



          required = [

              "analyze",

              "empty_result",

              "detect_market_regime",

              "health_check"

          ]



          for fn in required:


              if fn not in functions:


                  raise Exception(

                      f"Missing OpportunityEngine method: {fn}"

                  )



          engines = [

              "TrendEngine",

              "VolumeEngine",

              "LiquidityEngine",

              "OrderBlocksEngine",

              "SupportResistanceEngine",

              "CandlesAI",

              "HistoricalLearning",

              "SmartMoneyAnalyzer"

          ]



          code = open(
              file,
              encoding="utf-8"
          ).read()



          for engine in engines:


              if engine not in code:


                  raise Exception(

                      f"Missing engine: {engine}"

                  )



          print(
              "OpportunityEngine READY"
          )


          PY





      # ==========================================
      # File Size Check
      # ==========================================

      - name: File Size Check

        run: |


          python - <<'PY'


          files = [

              "backend/app/ai/signals_engine.py",

              "backend/app/ai/opportunity/opportunity_engine.py"

          ]



          for file in files:


              lines = sum(

                  1

                  for _ in open(
                      file,
                      encoding="utf-8"
                  )

              )



              print(
                  file,
                  "lines:",
                  lines
              )



              if lines > 15000:


                  raise Exception(

                      f"{file} too large"

                  )



          print(
              "File sizes OK"
          )


          PY





      # ==========================================
      # Final FalconAI Production Audit
      # ==========================================

      - name: FalconAI Final Production Audit

        run: |


          python - <<'PY'


          import ast



          files = [

              "backend/app/ai/signals_engine.py",

              "backend/app/ai/opportunity/opportunity_engine.py"

          ]



          print(
              "================================"
          )

          print(
              "FalconAI Final Audit Started"
          )

          print(
              "================================"
          )



          for file in files:


              with open(
                  file,
                  encoding="utf-8"
              ) as f:


                  code = f.read()



              tree = ast.parse(code)



              todo = code.count(
                  "TODO"
              )



              passes = sum(

                  1

                  for node in ast.walk(tree)

                  if isinstance(
                      node,
                      ast.Pass
                  )

              )



              functions = len(

                  [

                      n

                      for n in ast.walk(tree)

                      if isinstance(
                          n,
                          ast.FunctionDef
                      )

                  ]

              )



              classes = len(

                  [

                      n

                      for n in ast.walk(tree)

                      if isinstance(
                          n,
                          ast.ClassDef
                      )

                  ]

              )



              print()

              print(
                  file
              )

              print(
                  "Classes:",
                  classes
              )

              print(
                  "Functions:",
                  functions
              )

              print(
                  "TODO:",
                  todo
              )

              print(
                  "Pass:",
                  passes
              )



          print()

          print(
              "================================"
          )

          print(
              "FalconAI Production Audit PASSED"
          )

          print(
              "Engines READY"
          )

          print(
              "================================"
          )



          PY
