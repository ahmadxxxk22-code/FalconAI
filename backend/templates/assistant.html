<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FalconAI Assistant</title>

    <style>
        body{
            margin:0;
            background:#0f172a;
            color:white;
            font-family:Arial,sans-serif;
        }

        .container{
            width:90%;
            max-width:900px;
            margin:40px auto;
        }

        h1{
            text-align:center;
            color:#38bdf8;
        }

        .card{
            background:#1e293b;
            border-radius:15px;
            padding:20px;
            margin-top:20px;
            box-shadow:0 0 10px rgba(0,0,0,.3);
        }

        .signal{
            text-align:center;
            font-size:40px;
            font-weight:bold;
            margin-bottom:20px;
        }

        .row{
            display:flex;
            justify-content:space-between;
            margin:10px 0;
            padding:10px;
            background:#334155;
            border-radius:10px;
        }

        .summary{
            margin-top:20px;
            padding:15px;
            background:#475569;
            border-radius:10px;
            line-height:1.8;
        }
    </style>
</head>

<body>

<div class="container">

<h1>FalconAI Assistant</h1>

<div class="card">

<div class="signal" id="signal">
...
</div>

<div class="row">
<span>الثقة</span>
<span id="confidence"></span>
</div>

<div class="row">
<span>السعر</span>
<span id="price"></span>
</div>

<div class="row">
<span>EMA</span>
<span id="ema"></span>
</div>

<div class="row">
<span>RSI</span>
<span id="rsi"></span>
</div>

<div class="row">
<span>الاتجاه</span>
<span id="trend"></span>
</div>

<div class="summary" id="summary">
جارٍ التحميل...
</div>

</div>

</div>

<script>

fetch("/assistant/BTCUSDT")
.then(response => response.json())
.then(data => {

document.getElementById("signal").innerHTML = data.signal;

document.getElementById("confidence").innerHTML =
data.confidence + "%";

document.getElementById("price").innerHTML =
data.market.price;

document.getElementById("ema").innerHTML =
data.market.ema;

document.getElementById("rsi").innerHTML =
data.market.rsi;

document.getElementById("trend").innerHTML =
data.market.trend_strength;

document.getElementById("summary").innerHTML =
data.summary;

})
.catch(error => {

document.getElementById("summary").innerHTML =
"حدث خطأ أثناء تحميل البيانات.";

console.log(error);

});

</script>

</body>
  </html>
